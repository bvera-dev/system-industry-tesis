{% block stylesheets %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/static/assets/css/components/sidenav.css">
{% endblock stylesheets %}

<nav class="custom-sidenav" id="sidenav-main">
  <div class="custom-sidenav__inner">

    <div class="custom-sidenav__top">
      <a href="/" class="custom-sidenav__brand" title="Home">
        <i class="bi bi-house-door"></i>
      </a>
    </div>

    <ul class="custom-sidenav__menu">

      <li class="custom-sidenav__item">
        <a class="custom-sidenav__link {% if segment == 'index' %}active{% endif %}" href="/">
          <i class="bi bi-grid-1x2"></i>
          <span>Home</span>
        </a>
      </li>

      <li class="custom-sidenav__item">
        <a class="custom-sidenav__link {% if segment == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">
          <i class="bi bi-bar-chart-line"></i>
          <span>Dashboard</span>
        </a>
      </li>

      <li class="custom-sidenav__item">
        <a class="custom-sidenav__link {% if segment == 'camera' %}active{% endif %}" href="{% url 'camera' %}">
          <i class="bi bi-camera-video"></i>
          <span>Cámara</span>
        </a>
      </li>

      <li class="custom-sidenav__item">
        <a class="custom-sidenav__link {% if segment == 'alerta' %}active{% endif %}" href="{% url 'alerta' %}">
          <i class="bi bi-shield-exclamation"></i>
          <span>Alertas</span>
        </a>
      </li>

      <li class="custom-sidenav__item">
        <a class="custom-sidenav__link {% if segment == 'lista_informes' %}active{% endif %}" href="{% url 'lista_informes' %}">
          <i class="bi bi-file-earmark-text"></i>
          <span>Informe</span>
        </a>
      </li>

    </ul>

    <div class="custom-sidenav__bottom">
      <a href="/logout/" class="custom-sidenav__logout" title="Cerrar sesión">
        <i class="bi bi-box-arrow-right"></i>
        <span>Salir</span>
      </a>
    </div>

  </div>
</nav>
